<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TradeAndGrow</title>
  <style>
    :root { color-scheme: light; --ink: #172033; --muted: #637083; --line: #d8e0ea; --panel: #ffffff; --bg: #f4f7fb; --accent: #087f8c; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--ink); }
    main { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    section { width: min(720px, 100%); background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 28px; box-shadow: 0 18px 40px rgba(23, 32, 51, 0.08); }
    h1 { margin: 0 0 8px; font-size: 28px; letter-spacing: 0; }
    p { margin: 10px 0; line-height: 1.5; color: var(--muted); }
    a { color: var(--accent); font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>TradeAndGrow</h1>
      <p>TAG Indian Market public callback host.</p>
      <p>Use <a href="./upstox/callback/">Upstox callback</a> only from the official Upstox authorization redirect flow.</p>
    </section>
  </main>
</body>
</html>
