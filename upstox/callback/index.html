<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TradeAndGrow Upstox Callback</title>
  <style>
    :root { color-scheme: light; --ink: #172033; --muted: #617086; --line: #d8e0ea; --panel: #ffffff; --bg: #f4f7fb; --accent: #087f8c; --danger: #b42318; --ok: #13795b; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--ink); }
    main { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    section { width: min(820px, 100%); background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 26px; box-shadow: 0 18px 40px rgba(23, 32, 51, 0.08); }
    h1 { margin: 0; font-size: 28px; letter-spacing: 0; }
    .stamp { margin-top: 6px; color: var(--muted); font-size: 14px; }
    .status { margin-top: 22px; padding: 14px 16px; border-radius: 6px; border: 1px solid var(--line); background: #f8fafc; font-weight: 700; }
    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }
    label { display: block; margin-top: 20px; margin-bottom: 8px; color: var(--muted); font-size: 13px; font-weight: 700; text-transform: uppercase; }
    textarea, input { width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 12px; font: 15px Consolas, "Courier New", monospace; color: var(--ink); background: #ffffff; }
    textarea { min-height: 82px; resize: vertical; }
    button { margin-top: 12px; border: 0; border-radius: 6px; background: var(--accent); color: #ffffff; font-weight: 700; padding: 11px 16px; cursor: pointer; }
    p { color: var(--muted); line-height: 1.5; }
    code { background: #eef3f8; border: 1px solid var(--line); border-radius: 4px; padding: 2px 5px; }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>TradeAndGrow Upstox Callback</h1>
      <div class="stamp" id="stamp"></div>
      <div class="status" id="status">Reading authorization response...</div>

      <label for="code">Authorization Code</label>
      <textarea id="code" readonly></textarea>
      <button id="copyCode" type="button">Copy Code</button>

      <label for="command">TAG Exchange Command</label>
      <textarea id="command" readonly></textarea>
      <button id="copyCommand" type="button">Copy Command</button>

      <p>This page is static and does not store your token or code. It only reads the <code>code</code> value from the URL so you can exchange it inside TAG.</p>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code") || "";
    const error = params.get("error") || "";
    const state = params.get("state") || "";
    const account = state.toLowerCase().includes("secondary") ? "secondary" : "primary";
    const py = '& "C:\\Users\\dell\\.cache\\codex-runtimes\\codex-primary-runtime\\dependencies\\python\\python.exe"';
    const command = `${py} -m src.tag_indian_market.upstox_auth --account ${account} --exchange-code ${code || "CODE_FROM_URL"} --save-token --web-redirect-uri ${window.location.origin}${window.location.pathname}`;

    document.getElementById("stamp").textContent = new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata" }) + " IST";
    const status = document.getElementById("status");
    const codeBox = document.getElementById("code");
    const commandBox = document.getElementById("command");

    if (error) {
      status.textContent = `Authorization failed: ${error}`;
      status.classList.add("error");
    } else if (code) {
      status.textContent = `Authorization code captured for ${account}. Copy it now and exchange inside TAG.`;
      status.classList.add("ok");
    } else {
      status.textContent = "No authorization code found. Open this page only through the Upstox login redirect.";
      status.classList.add("error");
    }

    codeBox.value = code;
    commandBox.value = command;

    async function copyFrom(id) {
      const el = document.getElementById(id);
      el.focus();
      el.select();
      await navigator.clipboard.writeText(el.value);
    }
    document.getElementById("copyCode").addEventListener("click", () => copyFrom("code"));
    document.getElementById("copyCommand").addEventListener("click", () => copyFrom("command"));
  </script>
</body>
</html>
